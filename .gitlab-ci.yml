stages:
  - lint
  - build
  - test
  - package
  - trigger_deploy

lint:
  stage: lint
  script:
    - pnpm install --frozen-lockfile
    - pnpm lint

build:
  stage: build
  script:
    - pnpm install --frozen-lockfile
    - pnpm build

test:
  stage: test
  script:
    - pnpm install --frozen-lockfile
    - pnpm test --run

package:
  stage: package
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker login -u $DOCKER_HUB_USERNAME -p $DOCKER_HUB_TOKEN
    - docker build --build-arg VITE_API_BASE_URL=$VITE_API_BASE_URL --build-arg VITE_SUPABASE_URL=$VITE_SUPABASE_URL --build-arg VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY --build-arg VITE_WS_URL=$VITE_WS_URL --build-arg VITE_STRIPE_PUBLISHABLE_KEY=$VITE_STRIPE_PUBLISHABLE_KEY -t $DOCKER_HUB_USERNAME/skytrack-fe:latest -t $DOCKER_HUB_USERNAME/skytrack-fe:$CI_COMMIT_SHORT_SHA .
    - docker push $DOCKER_HUB_USERNAME/skytrack-fe:latest
    - docker push $DOCKER_HUB_USERNAME/skytrack-fe:$CI_COMMIT_SHORT_SHA

trigger_deploy:
  stage: trigger_deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  trigger:
    project: I547761/skytrack-infra
    branch: main