stages:
  - build
#  - test
  - deploy

build:
  stage: build
  script:
    - npm ci
    - npm run build
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

#test:
#  stage: test
#  script:
#    - npm ci
#    - npm run test -- --run
#  rules:
#    - if: '$CI_COMMIT_BRANCH == "dev"'

deploy:
  stage: deploy
  script:
    - docker build --build-arg VITE_SUPABASE_URL="$VITE_SUPABASE_URL" --build-arg VITE_SUPABASE_ANON_KEY="$VITE_SUPABASE_ANON_KEY" --build-arg VITE_API_BASE_URL="$VITE_API_BASE_URL" -t skytrack-frontend:latest .
    - docker stop skytrack-frontend || true
    - docker rm skytrack-frontend || true
    - docker run -d --name skytrack-frontend --restart unless-stopped -p 3000:80 skytrack-frontend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'